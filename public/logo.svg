<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Body of scooter -->
  <path d="M14 38 Q16 28 26 28 L38 28 L42 20 L50 20 L50 28 L54 28 Q58 28 58 34 L58 38 Z" fill="#ff6b35"/>
  <!-- Windshield -->
  <path d="M38 28 L42 20 L48 20 L46 28 Z" fill="#ffe0d0" opacity="0.7"/>
  <!-- Food box on back -->
  <rect x="18" y="22" width="16" height="14" rx="2" fill="#fff" stroke="#ff6b35" stroke-width="1.5"/>
  <path d="M18 27 L34 27" stroke="#ff6b35" stroke-width="1.5"/>
  <!-- Fork icon on box -->
  <path d="M24 29 L24 34 M27 29 L27 34 M24 29 Q25.5 31 27 29" stroke="#ff6b35" stroke-width="1" stroke-linecap="round"/>
  <!-- Seat -->
  <rect x="36" y="25" width="12" height="4" rx="2" fill="#cc4400"/>
  <!-- Exhaust -->
  <path d="M14 38 L10 40 Q8 41 10 42 L16 42" stroke="#cc4400" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Front wheel -->
  <circle cx="50" cy="44" r="7" fill="#333"/>
  <circle cx="50" cy="44" r="4" fill="#666"/>
  <circle cx="50" cy="44" r="1.5" fill="#999"/>
  <!-- Rear wheel -->
  <circle cx="18" cy="44" r="7" fill="#333"/>
  <circle cx="18" cy="44" r="4" fill="#666"/>
  <circle cx="18" cy="44" r="1.5" fill="#999"/>
  <!-- Frame bottom -->
  <path d="M18 38 L50 38" stroke="#cc4400" stroke-width="2" stroke-linecap="round"/>
  <!-- Handlebar -->
  <path d="M50 28 L54 24 L58 24" stroke="#cc4400" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Speed lines -->
  <path d="M4 34 L12 34 M2 38 L10 38 M4 42 L12 42" stroke="#ff6b35" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
